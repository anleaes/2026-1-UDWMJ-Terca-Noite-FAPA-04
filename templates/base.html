{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}MODELO APP{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<header class="topbar">
    <nav>
        <a href="{% url 'core:home' %}">Home</a> 
        <a href="{% url 'categories:list_categories' %}">Categorias</a>
        <a href="{% url 'products:list_products' %}">Produtos</a>
        <a href="{% url 'socialnetworks:list_socialnetworks' %}">Redes Sociais</a>
        <a href="{% url 'clients:list_clients' %}">Clientes</a>
        <a href="{% url 'employees:list_employees' %}">Empregados</a>
    </nav>
    <nav>
        <a href="{% url 'orders:list_orders' %}" ><button>Pedidos</button></a>
        <a href="{% url 'orders:list_items_products' %}" ><button>Compras</button></a>
    </nav>
    <nav>
        <a href="#"><button>{{ user.get_full_name|default:user.username }}</button></a>
        <a href="{% url 'accounts:user_change_information' user.username %}"><button>Conta</button></a>
        <a href="{% url 'accounts:user_change_password' %}"><button>Trocar senha</button></a>
        <a href="{% url 'accounts:user_logout' %}"><button>Sair</button></a>
    </nav>
</header>

<main class="container">
    {% block body %}{% endblock %}
</main>

<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
