{% extends 'base.html' %}

{% block title %}
  Adicionar Categoria - {{ block.super }}
{% endblock %}

{% block body %}

<div>

  <h2>Cadastro de Categoria</h2>
  
  <form action="" method="POST">
    {% csrf_token %}

    <div class="form-group">
    <label>Nome:</label>
    {{ form.name }}
    </div>

    <div>
    <label>Descricao:</label>
    {{ form.description }}
    </div>

    <button>Salvar</button>
  </form>
</div>
{% endblock %}
